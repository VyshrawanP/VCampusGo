name: Mess Notifications (Auto)

on:
  schedule:
    # Breakfast at 5:00 AM IST (23:30 UTC previous day)
    - cron: "30 23 * * *"
    
    # Lunch at 11:00 AM IST (5:30 UTC)
    - cron: "30 5 * * *"
    
    # Snacks at 2:00 PM IST (8:30 UTC)
    - cron: "30 9 * * *"
    
    # Dinner at 5:00 PM IST (11:30 UTC)
    - cron: "30 12 * * *"

  workflow_dispatch:
    inputs:
      meal:
        description: 'Meal type (breakfast/lunch/snacks/dinner)'
        required: true
        type: choice
        options:
          - breakfast
          - lunch
          - snacks
          - dinner

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Determine meal type
        id: meal
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger
            MEAL="${{ github.event.inputs.meal }}"
            echo "🔧 Manual trigger: $MEAL"
          else
            # Scheduled trigger - determine by UTC time
            UTC_HOUR=$(date -u +"%H")
            
            case $UTC_HOUR in
              23) MEAL="breakfast" ;;  # 23:30 UTC = 5:00 AM IST next day
              5)  MEAL="lunch" ;;      # 5:30 UTC = 11:00 AM IST
              8)  MEAL="snacks" ;;     # 8:30 UTC = 2:00 PM IST
              11) MEAL="dinner" ;;     # 11:30 UTC = 5:00 PM IST
              *)
                echo "⏰ Unexpected time: $UTC_HOUR UTC. Exiting."
                exit 0
                ;;
            esac
            
            IST_TIME=$(TZ=Asia/Kolkata date +"%I:%M %p")
            echo "⏰ Scheduled trigger at $IST_TIME IST → $MEAL"
          fi
          
          echo "meal=$MEAL" >> $GITHUB_OUTPUT

      - name: Call API to send notification
        run: |
          MEAL="${{ steps.meal.outputs.meal }}"
          API_URL="https://vcampusgo.vercel.app/api/send-mess?meal=$MEAL"
          
          echo "📡 Calling API: $API_URL"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.MESS_API_SECRET }}" \
            "$API_URL")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📥 Response Code: $HTTP_CODE"
          echo "📥 Response Body: $BODY"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Notification sent successfully"
          else
            echo "❌ API call failed with status $HTTP_CODE"
            exit 1
          fi