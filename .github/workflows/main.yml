name: Mess Notifications (Auto)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"  # Breakfast – 5:00 AM IST
    - cron: "30 5 * * *"   # Lunch – 11:00 AM IST
    - cron: "30 9 * * *"   # Snacks – 3:00 PM IST
    - cron: "45 12 * * *"  # Dinner – 6:15 PM IST

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Decide meal based on UTC time (SAFE)
        id: meal
        run: |
          HOUR=$(date -u +"%H")
          MIN=$(date -u +"%M")

          if [ "$HOUR" = "23" ] && [ "$MIN" -ge 25 ] && [ "$MIN" -le 35 ]; then
            echo "meal=breakfast" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "05" ] && [ "$MIN" -ge 25 ] && [ "$MIN" -le 35 ]; then
            echo "meal=lunch" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "09" ] && [ "$MIN" -ge 25 ] && [ "$MIN" -le 35 ]; then
            echo "meal=snacks" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "12" ] && [ "$MIN" -ge 40 ] && [ "$MIN" -le 50 ]; then
            echo "meal=dinner" >> $GITHUB_OUTPUT
          else
            echo "Not a mess notification time. Exiting."
            exit 0
          fi

      - name: Send mess notification
        run: node sendMessNotification.js ${{ steps.meal.outputs.meal }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
