name: Mess Notifications (Auto)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"  # Breakfast – 5:00 AM IST
    - cron: "30 5 * * *"   # Lunch – 11:00 AM IST
    - cron: "30 9 * * *"   # Snacks – 3:00 PM IST
    - cron: "45 12 * * *"  # Dinner – 6:15 PM IST

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Decide meal based on time
        id: meal
        run: |
          case "${{ github.event.schedule }}" in
            "30 23 * * *") echo "meal=breakfast" >> $GITHUB_OUTPUT ;;
            "30 5 * * *")  echo "meal=lunch" >> $GITHUB_OUTPUT ;;
            "30 9 * * *")  echo "meal=snacks" >> $GITHUB_OUTPUT ;;
            "45 12 * * *") echo "meal=dinner" >> $GITHUB_OUTPUT ;;
            *) exit 1 ;;
          esac

      - name: Send mess notification
        run: node sendMessNotification.js ${{ steps.meal.outputs.meal }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
