name: Mess Notifications

on:
  # ✅ MANUAL TRIGGER
  workflow_dispatch:
    inputs:
      meal:
        description: "Meal to send (manual run only)"
        required: true
        type: choice
        options:
          - breakfast
          - lunch
          - snacks
          - dinner

  # ✅ AUTOMATIC TRIGGER (UTC TIMES)
  schedule:
    - cron: "30 1 * * *"   # Breakfast (7:00 AM IST)
    - cron: "30 6 * * *"   # Lunch (12:00 PM IST)
    - cron: "30 10 * * *"  # Snacks (4:00 PM IST)
    - cron: "30 13 * * *"  # Dinner (7:00 PM IST)

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install firebase-admin

      # 🧠 DETERMINE MEAL (AUTO vs MANUAL)
      - name: Decide meal
        id: meal
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "meal=${{ github.event.inputs.meal }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.schedule }}" in
              "30 1 * * *") echo "meal=breakfast" >> $GITHUB_OUTPUT ;;
              "30 6 * * *") echo "meal=lunch" >> $GITHUB_OUTPUT ;;
              "30 10 * * *") echo "meal=snacks" >> $GITHUB_OUTPUT ;;
              "30 13 * * *") echo "meal=dinner" >> $GITHUB_OUTPUT ;;
            esac
          fi

      # 🚀 SEND NOTIFICATION
      - name: Send mess notification
        run: node sendMessNotification.js ${{ steps.meal.outputs.meal }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
