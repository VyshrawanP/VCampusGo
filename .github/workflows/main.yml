name: Mess Notifications (Auto)

on:
  schedule:
    # All times are UTC (IST = UTC + 5:30)
    - cron: "30 23 * * *"   # Breakfast – 5:00 AM IST
    - cron: "30 5 * * *"    # Lunch – 11:00 AM IST
    - cron: "30 9 * * *"    # Snacks – 3:00 PM IST
    - cron: "0 13 * * *"    # Dinner – 6:30 PM IST

  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci || npm install firebase-admin

      - name: Decide meal automatically (UTC-based)
        id: meal
        run: |
          HOUR=$(date -u +"%H")
          MIN=$(date -u +"%M")

          echo "UTC time now: $HOUR:$MIN"

          if [ "$HOUR" = "23" ] && [ "$MIN" = "30" ]; then
            echo "meal=breakfast" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "05" ] && [ "$MIN" = "30" ]; then
            echo "meal=lunch" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "09" ] && [ "$MIN" = "30" ]; then
            echo "meal=snacks" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "13" ] && [ "$MIN" = "00" ]; then
            echo "meal=dinner" >> $GITHUB_OUTPUT
          else
            echo "Not a scheduled mess notification time. Exiting safely."
            exit 0
          fi

      - name: Send mess notification
        run: node sendMessNotification.js ${{ steps.meal.outputs.meal }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
