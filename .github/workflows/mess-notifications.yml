name: Mess Notifications

on:
  schedule:
  - cron: "30 23 * * *"   # Breakfast – 5:00 AM IST
  - cron: "30 5 * * *"    # Lunch – 11:00 AM IST
  - cron: "30 9 * * *"    # Snacks – 3:00 PM IST
  - cron: "0 13 * * *"    # Dinner – 6:30 PM IST


  workflow_dispatch:
    inputs:
      meal:
        description: "Which meal notification to send?"
        required: true
        type: choice
        options:
          - breakfast
          - lunch
          - snacks
          - dinner

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci || npm install firebase-admin

      # Decide which meal to send
      - name: Resolve meal
        id: meal
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "meal=${{ github.event.inputs.meal }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.schedule }}" in
              "30 1 * * *")  echo "meal=breakfast" >> $GITHUB_OUTPUT ;;
              "30 6 * * *")  echo "meal=lunch" >> $GITHUB_OUTPUT ;;
              "30 10 * * *") echo "meal=snacks" >> $GITHUB_OUTPUT ;;
              "30 13 * * *") echo "meal=dinner" >> $GITHUB_OUTPUT ;;
              *) echo "Unknown schedule"; exit 1 ;;
            esac
          fi

      - name: Send notification
        run: node sendMessNotification.js ${{ steps.meal.outputs.meal }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
