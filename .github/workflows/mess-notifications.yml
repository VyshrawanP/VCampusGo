name: Mess Notifications (Auto)

on:
  # GitHub-safe schedule
  schedule:
    - cron: "*/15 * * * *"

  # Manual trigger (for testing)
  workflow_dispatch:
    inputs:
      meal:
        required: false
        type: choice
        options:
          - breakfast
          - lunch
          - snacks
          - dinner

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Resolve meal (IST windows, no DB, no repeats)
        id: meal
        run: |
          # Manual trigger always wins
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.meal }}" ]; then
            echo "meal=${{ github.event.inputs.meal }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          HOUR=$(TZ=Asia/Kolkata date +"%H")
          MIN=$(TZ=Asia/Kolkata date +"%M")
          NOW=$((10#$HOUR * 60 + 10#$MIN))

          echo "IST time: $HOUR:$MIN"

          # Breakfast → 05:00–05:15
          if [ $NOW -ge $((5*60)) ] && [ $NOW -lt $((5*60+15)) ]; then
            meal=breakfast

          # Lunch → 10:00–10:15
          elif [ $NOW -ge $((10*60)) ] && [ $NOW -lt $((10*60+15)) ]; then
            meal=lunch

          # Snacks → 14:15–14:30
          elif [ $NOW -ge $((14*60+15)) ] && [ $NOW -lt $((14*60+30)) ]; then
            meal=snacks

          # Dinner → 18:00–18:15
          elif [ $NOW -ge $((18*60)) ] && [ $NOW -lt $((18*60+15)) ]; then
            meal=dinner

          else
            echo "Not a send window. Exiting."
            exit 0
          fi

          echo "meal=$meal" >> $GITHUB_OUTPUT

      - name: Send notification (inline Node script)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node <<'EOF'
          import fs from "fs";
          import path from "path";
          import admin from "firebase-admin";

          const meal = process.env.MEAL || "${{ steps.meal.outputs.meal }}";

          if (!meal) {
            console.log("❌ Meal not provided");
            process.exit(0);
          }

          if (!process.env.FIREBASE_SERVICE_ACCOUNT) {
            throw new Error("FIREBASE_SERVICE_ACCOUNT missing");
          }

          if (!admin.apps.length) {
            admin.initializeApp({
              credential: admin.credential.cert(
                JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT)
              )
            });
          }

          const filePath = path.resolve(
            process.cwd(),
            "public/data/mess_menue.json"
          );

          const data = JSON.parse(fs.readFileSync(filePath, "utf8"));

          const istDate = new Date(
            new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
          );

          const today = istDate.getDate().toString().padStart(2, "0");
          const items = data[today]?.[meal];

          if (!items || items.length === 0) {
            console.log("⏭ No menu today");
            process.exit(0);
          }

          const body = "• " + items.join("\n• ");

          await admin.messaging().send({
            topic: "mess-alerts",
            notification: {
              title: `🍽 ${meal.toUpperCase()}`,
              body
            }
          });

          console.log(`✅ ${meal} notification sent`);
          EOF
